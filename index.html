<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="La tua guida digitale per la casa vacanza">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>BlueWelcome</title>
  <script>
    // Applica il tema prima del paint per evitare il lampo di tema sbagliato
    (function(){var t=localStorage.getItem('bluewelcome_theme');
      if(t!=='dark'&&t!=='light'){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}
      document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- UPDATE BANNER -->
  <div class="update-banner hidden" id="update-banner">
    <span data-i18n="updateAvailable">Update available</span>
    <button class="update-banner__btn" id="btn-reload" data-i18n="reload">Reload</button>
  </div>

  <!-- APP HEADER -->
  <header class="app-header">
    <span class="app-header__logo">BlueWelcome</span>
    <div class="app-header__actions">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
      <svg class="theme-toggle__sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="theme-toggle__moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-switcher__btn" id="lang-switcher-btn" aria-label="Select language">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>EN</span>
      </button>
      <div class="lang-switcher__dropdown hidden" id="lang-switcher-dropdown">
        <button class="lang-switcher__option active" data-lang="en">🇬🇧 English</button>
        <button class="lang-switcher__option" data-lang="it">🇮🇹 Italiano</button>
      </div>
    </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- ===== TAB: HOME ===== -->
    <section class="section active" id="section-home">
      <!-- Rendered by renderHome() -->
    </section>

    <!-- ===== TAB: INFO CASA ===== -->
    <section class="section" id="section-info">
      <nav class="sub-tab-bar" role="tablist">
        <button class="sub-tab-bar__item active" data-subtab="about" role="tab" data-i18n="about">About</button>
        <button class="sub-tab-bar__item" data-subtab="checkin" role="tab" data-i18n="checkin">Check-in</button>
        <button class="sub-tab-bar__item" data-subtab="checkout" role="tab" data-i18n="checkout">Check-out</button>
        <button class="sub-tab-bar__item" data-subtab="rules" role="tab" data-i18n="rules">Rules</button>
      </nav>
      <div class="sub-section active" id="sub-about" role="tabpanel">
        <!-- Rendered by renderAbout() -->
      </div>
      <div class="sub-section" id="sub-checkin" role="tabpanel">
        <!-- Rendered by renderCheckin() -->
      </div>
      <div class="sub-section" id="sub-checkout" role="tabpanel">
        <!-- Rendered by renderCheckout() -->
      </div>
      <div class="sub-section" id="sub-rules" role="tabpanel">
        <!-- Rendered by renderRules() -->
      </div>
    </section>

    <!-- ===== TAB: CONTATTI ===== -->
    <section class="section" id="section-contacts">
      <!-- Rendered by renderContacts() -->
    </section>

    <!-- ===== TAB: DINTORNI ===== -->
    <section class="section" id="section-nearby">
      <nav class="sub-tab-bar" role="tablist">
        <button class="sub-tab-bar__item active" data-subtab="map" role="tab" data-i18n="map">Map</button>
        <button class="sub-tab-bar__item" data-subtab="restaurants" role="tab" data-i18n="restaurants">Restaurants</button>
        <button class="sub-tab-bar__item" data-subtab="attractions" role="tab" data-i18n="attractions">Attractions</button>
        <button class="sub-tab-bar__item" data-subtab="transport" role="tab" data-i18n="transport">Transport</button>
      </nav>
      <div class="sub-section active" id="sub-map" role="tabpanel">
        <!-- Rendered by renderMapSection() -->
      </div>
      <div class="sub-section" id="sub-restaurants" role="tabpanel">
        <!-- Rendered by renderRestaurants() -->
      </div>
      <div class="sub-section" id="sub-attractions" role="tabpanel">
        <!-- Rendered by renderAttractions() -->
      </div>
      <div class="sub-section" id="sub-transport" role="tabpanel">
        <!-- Rendered by renderTransport() -->
      </div>
    </section>

    <!-- ===== TAB: FAQ ===== -->
    <section class="section" id="section-faq">
      <!-- Rendered by renderFAQ() -->
    </section>

  </main>

  <!-- ===== BOTTOM TAB BAR ===== -->
  <nav class="tab-bar" role="navigation" aria-label="Navigazione principale">
    <button class="tab-bar__item active" data-tab="home" aria-label="Home">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="tab-bar__label" data-i18n="home">Home</span>
    </button>
    <button class="tab-bar__item" data-tab="info" aria-label="House Info">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span class="tab-bar__label" data-i18n="info">House Info</span>
    </button>
    <button class="tab-bar__item" data-tab="contacts" aria-label="Contacts">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      <span class="tab-bar__label" data-i18n="contacts">Contacts</span>
    </button>
    <button class="tab-bar__item" data-tab="nearby" aria-label="Nearby">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <span class="tab-bar__label" data-i18n="nearby">Nearby</span>
    </button>
    <button class="tab-bar__item" data-tab="faq" aria-label="FAQ">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span class="tab-bar__label" data-i18n="faq">FAQ</span>
    </button>
  </nav>

  <!-- ===== QR MODAL ===== -->
  <div class="modal-overlay hidden" id="qr-modal" role="dialog" aria-modal="true" aria-label="QR Code Wi-Fi">
    <div class="modal-card">
      <button class="modal-card__close" id="qr-modal-close" aria-label="Chiudi">&times;</button>
      <p class="modal-card__title" data-i18n="scanToConnect">Inquadra per connetterti</p>
      <div class="modal-card__qr" id="qr-code-container"></div>
      <p class="modal-card__hint" id="qr-ssid-hint"></p>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="js/theme.js"></script>
  <script src="js/vendor/qrcode.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/config-loader.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
