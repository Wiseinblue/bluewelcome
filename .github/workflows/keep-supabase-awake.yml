# Tiene sveglio il progetto Supabase (piano free va in pausa dopo 7 giorni di inattività).
# Fa una richiesta banale alla tabella guides ogni giorno. Gratuito (GitHub Actions).
name: Keep Supabase awake

on:
  schedule:
    # Ogni giorno alle 06:00 UTC (~07:00/08:00 in Italia). Cron: min ora * * *
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # permette di lanciarlo a mano dal tab Actions, per testare

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (HEAD su guides)
        run: |
          echo "Pinging Supabase to keep the project awake..."
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            -X HEAD \
            "https://nmevhspourehvvxlxksm.supabase.co/rest/v1/guides?select=id&limit=1" \
            -H "apikey: sb_publishable_82BunYeDc_pLmmhM6Sb96g_RMFlR8Hk" \
            -H "Authorization: Bearer sb_publishable_82BunYeDc_pLmmhM6Sb96g_RMFlR8Hk"
          echo "Done."
